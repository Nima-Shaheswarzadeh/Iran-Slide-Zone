<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایران اسلاید زون | Iran Slide Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cmBg: '#111214',      /* مشکی عمیق محیط بازی */
                        cmCard: '#1e2024',    /* زغال‌سنگی مات و شیک */
                        cmAccent: '#5865f2',  /* رنگ اصلی ملایم و حرفه‌ای */
                        cmText: '#dbdee1'     /* سفید مات برای خسته نشدن چشم */
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        body { 
            font-family: 'Vazir', sans-serif; 
            background-color: #111214; 
            color: #dbdee1;
            overflow-x: hidden; 
        }
        
        /* بک‌گراند مینیمال و بسیار ملایم متحرک دورانی */
        .bg-animation {
            position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%;
            background: radial-gradient(circle at 30% 30%, rgba(88, 101, 242, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(30, 32, 36, 0.3) 0%, transparent 60%);
            animation: spinBg 40s linear infinite; z-index: -1; pointer-events: none;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        /* ساختار سه‌بعدی اصلاح شده بدون باگ و پرش */
        .card-perspective { perspective: 2000px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; 
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 1rem;
        }
        .card-flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            border-radius: 1rem; overflow: hidden; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .card-back { transform: rotateY(180deg); }
        
        /* خط اتصال فلوچارت معلق */
        .flow-line { position: absolute; width: 2px; background: linear-gradient(to bottom, #5865f2, transparent); left: 50%; transform: translateX(-50%); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #2b2d31; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div class="bg-animation"></div>

    <header id="mainHeader" class="border-b border-[#2b2d31] bg-[#111214]/80 backdrop-blur-md sticky top-0 z-40 px-4 py-3 hidden">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showPage('welcomePage')">
                <span class="text-base">🏁</span>
                <h1 class="text-sm font-black tracking-wider text-white">IRAN SLIDE ZONE</h1>
            </div>
            <div class="relative w-full sm:w-80">
                <input type="text" id="searchBar" placeholder="جستجو در مودها..." class="w-full bg-[#1e2024] border border-[#2b2d31] rounded-xl px-4 py-1.5 pr-10 text-xs text-white focus:outline-none focus:border-cmAccent transition-all">
                <i class="fas fa-search absolute left-3 top-2.5 text-gray-500 text-xs"></i>
            </div>
        </div>
    </header>

    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center text-center px-4 py-12">
        <div class="max-w-xl bg-[#1e2024] border border-[#2b2d31] p-8 rounded-2xl shadow-2xl">
            <span class="text-4xl inline-block mb-3">🏎️</span>
            <h2 class="text-xl font-black text-white mb-2">ایران اسلاید زون</h2>
            <p class="text-gray-400 text-xs leading-relaxed mb-6">مرجع تخصصی و بهینه مودهای بازی Assetto Corsa زنده متصل به پایگاه داده ابری.</p>
            <button onclick="showPage('categoriesPage')" class="bg-cmAccent hover:bg-[#4752c4] text-white font-bold px-8 py-3 rounded-xl shadow-lg transition-all text-xs">
                ورود به بخش دانلود مود <i class="fas fa-arrow-left mr-2"></i>
            </button>
        </div>
    </section>

    <section id="categoriesPage" class="max-w-5xl w-full mx-auto px-4 py-12 hidden">
        <h2 class="text-base font-bold text-center mb-1 text-white">انتخاب دسته‌بندی مود</h2>
        <p class="text-center text-[11px] text-gray-500 mb-8">وارد بخش مورد نظر خود شوید</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="categoriesMenuGrid"></div>
        <div class="text-center mt-8">
            <button onclick="showPage('welcomePage')" class="text-xs text-gray-500 hover:text-white transition-all"><i class="fas fa-arrow-right ml-1"></i> بازگشت به خانه</button>
        </div>
    </section>

    <section id="galleryPage" class="max-w-[1500px] w-full mx-auto px-4 py-6 hidden flex-1 flex flex-col md:flex-row gap-6">
        
        <aside class="w-full md:w-64 bg-[#1e2024] border border-[#2b2d31] rounded-2xl p-4 h-auto md:h-[calc(100vh-140px)] sticky top-20 overflow-y-auto custom-scroll flex flex-col gap-2">
            <h3 class="text-[11px] font-bold text-gray-400 mb-1 pb-2 border-b border-[#2b2d31] flex items-center gap-2 uppercase tracking-wider">
                <i class="fas fa-folder-open text-cmAccent"></i> File Explorer
            </h3>
            <div id="explorerTree" class="flex flex-col gap-0.5">
                </div>
        </aside>

        <main class="flex-1">
            <div id="modsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-y-16 gap-x-6 pt-6">
                </div>
        </main>
    </section>

    <div id="infoModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden" onclick="closeInfoModal()">
        <div class="bg-[#1e2024] border border-[#2b2d31] rounded-2xl max-w-md w-full overflow-hidden shadow-2xl scale-95 transition-all duration-200" id="infoModalContainer" onclick="event.stopPropagation()">
            <div class="p-4 border-b border-[#2b2d31] flex justify-between items-center bg-[#111214]">
                <h3 id="infoModalTitle" class="font-bold text-xs text-white">مشخصات مود</h3>
                <button onclick="closeInfoModal()" class="text-gray-400 hover:text-white text-base"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-5 space-y-4 text-xs">
                <div>
                    <h4 class="text-gray-400 font-bold mb-1">توضیحات ادمین:</h4>
                    <p id="infoModalDesc" class="text-gray-300 leading-relaxed text-justify bg-[#111214] p-3 rounded-xl border border-[#2b2d31]"></p>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-gray-400 font-bold">تگ‌ها:</span>
                    <div id="infoModalTags" class="flex flex-wrap gap-1"></div>
                </div>
                <div class="flex items-center justify-between border-t border-[#2b2d31] pt-3 text-[11px]">
                    <div class="flex items-center gap-2">
                        <img id="infoModalAvatar" class="w-5 h-5 rounded-full bg-[#111214]" src="">
                        <span>ارسال: <strong id="infoModalAuthor" class="text-white"></strong></span>
                    </div>
                    <span id="infoModalCategory" class="text-cmAccent font-bold bg-cmAccent/10 px-2 py-0.5 rounded-lg uppercase"></span>
                </div>
            </div>
        </div>
    </div>

    <footer class="border-t border-[#1e2024] bg-[#111214] py-3 text-center text-[10px] text-gray-600">
        Iran Slide Zone © 2026 - Live Content Manager Feed
    </footer>

    <script src="app.js"></script>
</body>
</html>

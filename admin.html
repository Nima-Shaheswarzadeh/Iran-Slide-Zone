<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پنل مدیریت پست | Iran Slide Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://v1.fontapi.ir/css/Vazir'); body{font-family:'Vazir',sans-serif; background-color:#090F26;}</style>
</head>
<body class="text-gray-200 p-6 flex justify-center items-center min-h-screen">
    <div class="max-w-xl w-full bg-[#101A40] border border-gray-800 p-6 rounded-2xl shadow-xl">
        <h2 class="text-base font-bold text-[#6496FF] mb-4 border-b border-gray-800 pb-2">➕ افزودن مود جدید به سیستم</h2>
        
        <form id="f" class="space-y-3 text-xs">
            <div class="grid grid-cols-2 gap-3">
                <div><label class="block mb-1 text-gray-400">نام کامل مود</label><input type="text" id="t" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 focus:outline-none focus:border-[#6496FF]"></div>
                <div><label class="block mb-1 text-gray-400">شناسه یکتا (کوچک و با خط تیره)</label><input type="text" id="id" placeholder="samand-shoti" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 focus:outline-none focus:border-[#6496FF]"></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block mb-1 text-gray-400">دسته بندی</label>
                    <select id="c" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 focus:outline-none">
                        <option value="cars">Cars 🚗</option>
                        <option value="maps">Maps 🗺️</option>
                        <option value="csp">CSP 👨‍💻</option>
                        <option value="graphics">Graphics 🌠</option>
                        <option value="servers">Servers 🌐</option>
                        <option value="apps">Apps 📲</option>
                        <option value="drivers">Drivers 👥</option>
                    </select>
                </div>
                <div><label class="block mb-1 text-gray-400">برند (مخصو‌ص ماشین)</label><input type="text" id="b" placeholder="IKCO / BMW" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
                <div><label class="block mb-1 text-gray-400">کشور (مخصوص مپ)</label><input type="text" id="sub" placeholder="Iran / Japan" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div><label class="block mb-1 text-gray-400">حجم فایل</label><input type="text" id="s" placeholder="120 MB" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
                <div><label class="block mb-1 text-gray-400">نسخه</label><input type="text" id="v" value="1.0" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
                <div><label class="block mb-1 text-gray-400">نام ادمین پست</label><input type="text" id="an" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
            </div>
            <div><label class="block mb-1 text-gray-400">لینک عکس نمای جلو (اصلی)</label><input type="url" id="img" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
            <div><label class="block mb-1 text-gray-400">لینک عکس نمای عقب</label><input type="url" id="bimg" placeholder="در صورت خالی بودن، همان عکس جلو اعمال می‌شود" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
            <div><label class="block mb-1 text-gray-400">لینک دانلود فایل</label><input type="url" id="d" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
            <div><label class="block mb-1 text-gray-400">تگ‌ها (با کاما ,)</label><input type="text" id="tg" placeholder="drift, iran" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5"></div>
            <div><label class="block mb-1 text-gray-400">توضیحات مود (نمایش پشت کارت)</label><textarea id="ds" rows="2" required class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 resize-none"></textarea></div>
            <button type="button" onclick="makeJSON()" class="w-full bg-[#6496FF] text-brandDark font-black py-2.5 rounded-xl hover:bg-blue-400 transition-all">تولید کد JSON</button>
        </form>
        <textarea id="out" readonly placeholder="کد خروجی..." class="w-full h-24 bg-gray-950 border border-gray-800 rounded-xl p-3 font-mono text-[10px] mt-4 text-emerald-400 focus:outline-none resize-none" dir="ltr"></textarea>
    </div>
    <script>
        function makeJSON(){
            const tags = document.getElementById('tg').value.split(',').map(t => t.trim()).filter(t => t !== "");
            const obj = {
                id: document.getElementById('id').value.trim(),
                title: document.getElementById('t').value.trim(),
                category: document.getElementById('c').value,
                brand: document.getElementById('c').value === 'cars' ? document.getElementById('b').value.trim() : "",
                subcategory: document.getElementById('c').value === 'maps' ? document.getElementById('sub').value.trim() : "",
                image: document.getElementById('img').value.trim(),
                backImage: document.getElementById('bimg').value.trim() || document.getElementById('img').value.trim(),
                size: document.getElementById('s').value.trim(),
                version: document.getElementById('v').value.trim(),
                tags: tags,
                download: document.getElementById('d').value.trim(),
                description: document.getElementById('ds').value.trim(),
                author: { name: document.getElementById('an').value.trim(), avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(document.getElementById('an').value)}` }
            };
            document.getElementById('out').value = ",\n" + JSON.stringify(obj, null, 2);
        }
    </script>
</body>
</html>
